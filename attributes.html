<!DOCTYPE html>
<html>
<head>
    <title>Attribute Methods</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
</head>

<body>

<h2>Attribute Methods Demo</h2>

<!-- Image -->
<img id="img" src="C:\Users\Jamuna potnuru\Desktop\jqueryLab\jquery\moon.jpg" height="100px" width="100px"><br><br>

<button id="changeImg" onclick="changeimg()">Change Image</button>
<button id="removeImg" onclick="removeimg()">Remove Image</button>

<br><br>

<!-- Checkbox -->
<input type="checkbox" id="check"> Accept Terms<br>
<button id="enable">Enable</button>
<button id="disable">Disable</button>

<br><br>

<!-- Input -->
<input type="text" id="name" placeholder="Enter name">
<button id="getVal">Get Value</button>

<p id="output"></p>
<script>
      function changeimg(){
        $("#img").attr("src","file_000000000020720798177745ab43d6dd.png");
      }
      function removeimg(){
        $("#img").removeAttr("src");
      }
       $("#enable").click(function(){
        $("#check").prop("checked", true);
    });
     $("#disable").click(function(){
        $("#check").prop("checked", false);
    });
      $("#getVal").click(function(){
        let value = $("#name").val();
        $("#output").text("You entered: " + value);
    });
</script>
</body>
</html>
