<!DOCTYPE html>
<html>
<head>
    <title>Style Manipulation</title>

    <!-- jQuery (correct version) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .highlight {
            background-color: yellow;
            font-size: 20px;
        }

        .dark {
            background-color: black;
            color: white;
        }
    </style>

<body>

<h2>jQuery Style Manipulation</h2>

<p id="text">This is a sample text</p>

<button id="colorBtn">Change Color</button>
<button id="addClassBtn">Add Class</button>
<button id="removeClassBtn">Remove Class</button>
<button id="toggleClassBtn">Toggle Class</button>
<button id="checkClassBtn">Check Class</button>

<script>
$(document).ready(function(){

    $("#colorBtn").click(function(){
        $("#text").css("color", "blue");
    });

    $("#addClassBtn").click(function(){
        $("#text").addClass("highlight");
    });

    $("#removeClassBtn").click(function(){
        $("#text").removeClass("highlight");
    });

    $("#toggleClassBtn").click(function(){
        $("#text").toggleClass("dark");
    });

    $("#checkClassBtn").click(function(){
        if($("#text").hasClass("highlight")){
            alert("Highlight class is present");
        } else {
            alert("Highlight class is NOT present");
        }
    });

});
</script>

</body>
</html>
